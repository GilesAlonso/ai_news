name: Auto-Compress Older Images

on:
  push:
    paths:
      - 'images/**.png'
  schedule:
    - cron: '0 12 * * *' # Also runs automatically once a day at noon, just in case
  workflow_dispatch:

jobs:
  compress:
    # Prevents infinite loops (stops the bot from reacting to its own commits)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Compression Tool (pngquant)
        run: sudo apt-get install -y pngquant

      - name: Compress images older than 3 days
        run: |
          # Calculate the date from 3 days ago in YYYY-MM-DD format
          THRESHOLD_DATE=$(date -d "3 days ago" +%Y-%m-%d)
          echo "Threshold Date: $THRESHOLD_DATE"
          echo "Looking for images older than this date and larger than 500KB..."
          
          # Loop through all png files in the images folder
          for img in images/*.png; do
            # Extract just the date from the filename (e.g., 2026-06-20)
            BASENAME=$(basename "$img" .png)
            
            # Check if the filename matches our YYYY-MM-DD format (ignores logos/other files)
            if [[ $BASENAME =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              
              # Compare the dates! (YYYY-MM-DD can be compared alphabetically)
              if [[ "$BASENAME" < "$THRESHOLD_DATE" ]]; then
                
                # Check if the file is larger than 500KB (512000 bytes)
                FILESIZE=$(stat -c%s "$img")
                if [ $FILESIZE -gt 512000 ]; then
                  echo "Compressing $img (Size: $FILESIZE bytes)..."
                  pngquant --ext .png --force --speed 1 --quality 60-80 "$img"
                fi
                
              fi
            fi
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          
          # Only commit if pngquant actually changed files
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: compress older images [skip ci]" && git push)
