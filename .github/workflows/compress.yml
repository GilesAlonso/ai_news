name: Auto-Compress Older Images

on:
  push:
    paths:
      - 'images/**.png'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  compress:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Compression Tools
        # We install pngquant, imagemagick, and file (to detect true mime types)
        run: sudo apt-get install -y pngquant imagemagick file

      - name: Compress images older than 3 days
        run: |
          THRESHOLD_DATE=$(date -d "3 days ago" +%Y-%m-%d)
          echo "Threshold Date: $THRESHOLD_DATE"
          
          for img in images/*.png; do
            # Check if the file exists (prevents errors if the folder is empty)
            [ -e "$img" ] || continue
            
            BASENAME=$(basename "$img" .png)
            
            if [[ $BASENAME =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              if [[ "$BASENAME" < "$THRESHOLD_DATE" ]]; then
                
                FILESIZE=$(stat -c%s "$img")
                if [ $FILESIZE -gt 512000 ]; then
                  # Look at the "DNA" of the file to see what it actually is
                  MIME_TYPE=$(file -b --mime-type "$img")
                  echo "Processing $img (Size: $FILESIZE bytes, True format: $MIME_TYPE)"
                  
                  if [[ "$MIME_TYPE" == "image/png" ]]; then
                    # It's a real PNG, use pngquant
                    pngquant --ext .png --force --speed 1 --quality 60-80 "$img"
                  else
                    # It's a JPEG or WebP masquerading as a PNG!
                    # Use ImageMagick to compress it as a high-efficiency JPEG (Quality 70), 
                    # but force it to save back into the exact same .png filename.
                    convert "$img" -strip -interlace Plane -quality 70 jpeg:"$img"
                  fi
                  
                fi
              fi
            fi
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: compress older images [skip ci]" && git push)
